<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHG7 Gallery - Album Foto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transform: translateY(-100%);
            animation: slideDown 0.8s ease forwards;
        }

        @keyframes slideDown {
            to {
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            animation: fadeIn 0.8s 0.3s ease forwards;
        }

        .back-home {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.6rem 1.5rem;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 0.8s 0.4s ease forwards;
        }

        .back-home:hover {
            background: #667eea;
            transform: translateX(-5px);
        }

        /* Hero */
        .hero {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('fto/2.jpeg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 70px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 2s 0.5s forwards;
        }

        @keyframes shimmer {
            to {
                left: 100%;
            }
        }

        .hero-content {
            transform: scale(0.8);
            opacity: 0;
            animation: zoomIn 1s 0.6s ease forwards;
        }

        @keyframes zoomIn {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .hero-content h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .hero-content p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Categories */
        .categories {
            padding: 3rem 5%;
        }

        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .category-btn {
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0;
            transform: translateY(30px);
        }

        .category-btn:nth-child(1) {
            animation: slideUp 0.6s 0.8s ease forwards;
        }

        .category-btn:nth-child(2) {
            animation: slideUp 0.6s 1.0s ease forwards;
        }

        .category-btn:nth-child(3) {
            animation: slideUp 0.6s 1.2s ease forwards;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            transform: translateY(-3px);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 0 5% 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 3/4;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(30px) scale(0.9);
            animation: fadeInScale 0.8s forwards;
        }

        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Delay untuk setiap foto */
        .gallery-item:nth-child(1) { animation-delay: 1.4s; }
        .gallery-item:nth-child(2) { animation-delay: 1.5s; }
        .gallery-item:nth-child(3) { animation-delay: 1.6s; }
        .gallery-item:nth-child(4) { animation-delay: 1.7s; }
        .gallery-item:nth-child(5) { animation-delay: 1.8s; }
        .gallery-item:nth-child(6) { animation-delay: 1.9s; }
        .gallery-item:nth-child(7) { animation-delay: 2.0s; }
        .gallery-item:nth-child(8) { animation-delay: 2.1s; }
        .gallery-item:nth-child(9) { animation-delay: 2.2s; }
        .gallery-item:nth-child(10) { animation-delay: 2.3s; }
        .gallery-item:nth-child(11) { animation-delay: 2.4s; }
        .gallery-item:nth-child(12) { animation-delay: 2.5s; }
        .gallery-item:nth-child(13) { animation-delay: 2.6s; }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            transform: translateY(100%);
            transition: transform 0.4s ease;
        }

        .gallery-item:hover .caption {
            transform: translateY(0);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
            transform: scale(0.8);
            animation: modalZoom 0.4s ease forwards;
        }

        @keyframes modalZoom {
            to {
                transform: scale(1);
            }
        }

        .modal-content img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-caption {
            color: white;
            text-align: center;
            margin-top: 1rem;
            font-size: 1.1rem;
            opacity: 0;
            animation: fadeInUp 0.4s 0.2s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 2010;
        }

        .close-modal:hover {
            background: rgba(255,0,0,0.3);
            transform: rotate(90deg);
        }

        .modal-prev, .modal-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            opacity: 0;
            animation: fadeIn 0.4s 0.3s ease forwards;
        }

        .modal-prev { left: 20px; }
        .modal-next { right: 20px; }

        .modal-prev:hover, .modal-next:hover {
            background: #667eea;
            transform: translateY(-50%) scale(1.1);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            background: #050505;
            color: #888;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1s 2.8s ease forwards;
        }

        /* Loading Animation saat ganti kategori */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #888;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animasi transisi saat ganti kategori */
        .gallery-grid {
            transition: opacity 0.5s ease;
        }

        .gallery-grid.fade-out {
            opacity: 0;
        }

        .gallery-grid.fade-in {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2rem; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .modal-prev { left: 10px; width: 40px; height: 40px; }
            .modal-next { right: 10px; width: 40px; height: 40px; }
            
            .category-btn:nth-child(1) { animation-delay: 0.6s; }
            .category-btn:nth-child(2) { animation-delay: 0.7s; }
            .category-btn:nth-child(3) { animation-delay: 0.8s; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="back-home">
            <i class="fas fa-arrow-left"></i>
            <span>Kembali ke Beranda</span>
        </a>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h2>Album Foto PHG7</h2>
        </div>
    </section>

    <!-- Categories -->
    <section class="categories">
        <div class="category-tabs">
            <button class="category-btn active" onclick="showCategory('belajar', this)">Kegiatan Belajar</button>
            <button class="category-btn" onclick="showCategory('kebersamaan', this)">Foto Kebersamaan</button>
            <button class="category-btn" onclick="showCategory('wisuda', this)">Acara Wisuda</button>
        </div>
    </section>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="galleryGrid">
        <!-- Akan diisi JavaScript -->
    </div>

    <!-- Loading (hidden by default) -->
    <div class="loading" id="loading" style="display: none;">
        <i class="fas fa-spinner"></i>
        <p>Memuat foto...</p>
    </div>

    <!-- Modal -->
    <div class="modal" id="photoModal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <img src="" alt="" id="modalImage">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
        <button class="modal-prev" onclick="prevPhoto()"><i class="fas fa-chevron-left"></i></button>
        <button class="modal-next" onclick="nextPhoto()"><i class="fas fa-chevron-right"></i></button>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2024 PHG7 - Alumni Pesantren Huffadz Gemma Angkatan 2023</p>
    </footer>

    <script>
        // Data Foto
        const photos = {
            belajar: [
                { src: 'fto/kegiatan-belajar-1.jpg', caption: 'Belajar Tahfidz' },
                { src: 'fto/kegiatan-belajar-2.jpg', caption: 'Murajaah Bersama' },
                { src: 'fto/kegiatan-belajar-3.jpg', caption: 'Belajar Kitab' },
                { src: 'fto/kegiatan-belajar-4.jpg', caption: 'Diskusi Ilmiah' },
                { src: 'fto/kegiatan-belajar-5.jpg', caption: 'Belajar Malam' },
                { src: 'fto/kegiatan-belajar-6.jpg', caption: 'Tahsin Al-Quran' }
            ],
            kebersamaan: [
                { src: 'fto/momen-1.jpg', caption: 'Makan Bersama' },
                { src: 'fto/momen-2.jpg', caption: 'Olahraga Pagi' },
                { src: 'fto/momen-3.jpg', caption: 'Berkebun' },
                { src: 'fto/momen-4.jpg', caption: 'Liburan Santri' },
                { src: 'fto/momen-5.jpg', caption: 'Bermain Bersama' },
                { src: 'fto/momen-6.jpg', caption: 'Kegiatan Outdoor' }
            ],
            wisuda: [
                { src: 'p/7.JPG', caption: 'Dokumentasi Wisuda' },
                { src: 'p/8.JPG', caption: 'Dokumentasi Wisuda ' },
                { src: 'p/9.JPG', caption: 'Dokumentasi Wisuda ' },
                { src: 'p/10.JPG', caption: 'Dokumentasi Wisuda ' },
                { src: 'p/p.jpeg', caption: 'Dokumentasi Wisuda ' },
                { src: 'p/12.JPG', caption: 'Dokumentasi Wisuda ' },
                { src: 'p/13.JPG', caption: 'Dokumentasi Wisuda ' },
                { src: 'p/14.JPG', caption: 'Dokumentasi Wisuda ' },
                { src: 'p/15.JPG', caption: 'Dokumentasi Wisuda ' },
                { src: 'p/16.JPG', caption: 'Dokumentasi Wisuda ' },
                { src: 'p/17.JPG', caption: 'Dokumentasi Wisuda ' },
                { src: 'p/19.JPG', caption: 'Dokumentasi Wisuda ' },
                { src: 'p/18.JPG', caption: 'Dokumentasi Wisuda ' }
            ]
        };

        let currentCategory = 'belajar';
        let currentPhotos = [];
        let currentIndex = 0;

        // Load initial category
        window.onload = function() {
            currentPhotos = photos.belajar;
            renderGallery();
            
            // Tambah class fade-in ke gallery grid
            const grid = document.getElementById('galleryGrid');
            grid.classList.add('fade-in');
        };

        // Show category function
        function showCategory(category, btn) {
            if (currentCategory === category) return;
            
            currentCategory = category;
            currentPhotos = photos[category];
            
            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            btn.classList.add('active');
            
            // Animasi ganti kategori
            const grid = document.getElementById('galleryGrid');
            grid.classList.add('fade-out');
            
            setTimeout(() => {
                renderGallery();
                grid.classList.remove('fade-out');
                grid.classList.add('fade-in');
                
                // Scroll ke atas grid dengan smooth
                grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 500);
        }

        // Render gallery function
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            let html = '';
            
            currentPhotos.forEach((photo, index) => {
                // Hitung delay berdasarkan index
                const delay = 1.4 + (index * 0.1);
                html += `
                    <div class="gallery-item" onclick="openModal(${index})" style="animation-delay: ${delay}s">
                        <img src="${photo.src}" alt="${photo.caption}" loading="lazy">
                        <div class="caption">${photo.caption}</div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        // Modal functions
        function openModal(index) {
            currentIndex = index;
            const modal = document.getElementById('photoModal');
            const modalImg = document.getElementById('modalImage');
            const modalCaption = document.getElementById('modalCaption');
            
            modalImg.src = currentPhotos[index].src;
            modalCaption.textContent = currentPhotos[index].caption;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('photoModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function prevPhoto() {
            currentIndex = (currentIndex - 1 + currentPhotos.length) % currentPhotos.length;
            updateModal();
        }

        function nextPhoto() {
            currentIndex = (currentIndex + 1) % currentPhotos.length;
            updateModal();
        }

        function updateModal() {
            const modalImg = document.getElementById('modalImage');
            const modalCaption = document.getElementById('modalCaption');
            
            modalImg.style.opacity = '0';
            modalImg.style.transform = 'scale(0.8)';
            
            setTimeout(() => {
                modalImg.src = currentPhotos[currentIndex].src;
                modalCaption.textContent = currentPhotos[currentIndex].caption;
                modalImg.style.opacity = '1';
                modalImg.style.transform = 'scale(1)';
                modalImg.style.transition = 'all 0.3s ease';
            }, 200);
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('photoModal').classList.contains('active')) return;
            
            if (e.key === 'ArrowLeft') prevPhoto();
            if (e.key === 'ArrowRight') nextPhoto();
            if (e.key === 'Escape') closeModal();
        });

        // Touch support for mobile
        let touchStartX = 0;
        let touchEndX = 0;

        document.getElementById('photoModal').addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.getElementById('photoModal').addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) nextPhoto();
            if (touchEndX > touchStartX + 50) prevPhoto();
        });

        // Preload images untuk animasi lebih smooth
        function preloadImages() {
            const allPhotos = [...photos.belajar, ...photos.kebersamaan, ...photos.wisuda];
            allPhotos.forEach(photo => {
                const img = new Image();
                img.src = photo.src;
            });
        }
        preloadImages();
    </script>
</body>
</html>
