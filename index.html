<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHG7 Gallery - Ultra Fullscreen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            padding: 30px 5% 10px;
            text-align: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- GALLERY GRID (HORIZONTAL) --- */
        .gallery-grid {
            display: flex;
            gap: 15px;
            padding: 20px 5% 50px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .gallery-grid::-webkit-scrollbar { display: none; }

        .gallery-item {
            flex: 0 0 280px;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            scroll-snap-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s ease;
        }

        .gallery-item.show { opacity: 1; transform: translateY(0); }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- MODAL ULTRA FULLSCREEN (MENTOK ATAS BAWAH) --- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            width: 100%;
            height: 100%;
            /* FOTO DIPAKSA FULL MENTOK TANPA SISA HITAM */
            object-fit: cover; 
            display: block;
        }

        /* Tombol Close Melayang di Atas Foto */
        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            cursor: pointer;
            z-index: 10000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .close-btn:hover { background: #f00; border-color: #f00; }

        /* Teks Info Tipis di Bawah agar tidak makan tempat */
        .caption-overlay {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 30px 10px 10px;
            pointer-events: none;
        }

        /* Responsif Tablet & HP */
        @media (max-width: 768px) {
            .gallery-item { flex: 0 0 85vw; height: 65vh; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PHG7</div>
    </header>

    <div class="gallery-grid" id="mainGrid"></div>

    <div class="modal" id="modalContainer">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img src="" id="fullViewImg">
        <div class="caption-overlay">
            <h2 id="imgTitle" style="font-size: 1.2rem;"></h2>
        </div>
    </div>

    <script>
        // Masukkan semua data foto kamu di sini
        const album = [
            { src: 'p/7.JPG', title: 'PHG7' },
            { src: 'p/8.JPG', title: 'PHG7' },
            { src: 'p/9.JPG', title: 'PHG7' },
            { src: 'p/10.JPG', title: 'PHG7' },
            { src: 'p/p.jpeg', title: 'PHG7' },
            { src: 'p/12.JPG', title: 'PHG7' },
            { src: 'p/13.JPG', title: 'PHG7' },
            { src: 'p/14.JPG', title: 'PHG7' },
            { src: 'p/15.JPG', title: 'PHG7' },
            { src: 'p/16.JPG', title: 'PHG7' },
            { src: 'p/17.JPG', title: 'PHG7' }
        ];

        const grid = document.getElementById('mainGrid');

        // Fungsi Load Foto ke Halaman Utama
        album.forEach((foto, i) => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.onclick = () => openFull(foto);
            item.innerHTML = `<img src="${foto.src}" loading="lazy">`;
            grid.appendChild(item);
            
            // Animasi Masuk
            setTimeout(() => item.classList.add('show'), i * 100);
        });

        function openFull(data) {
            const modal = document.getElementById('modalContainer');
            const img = document.getElementById('fullViewImg');
            const title = document.getElementById('imgTitle');

            img.src = data.src;
            title.innerText = data.title;
            
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modalContainer');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
