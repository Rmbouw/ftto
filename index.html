<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHG7 Gallery - Classic with Zoom & Nav</title>
    
    <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent; /* Ilangin kotak biru di HP */
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* --- HEADER CLASSIC --- */
        header {
            padding: 30px 5% 10px;
            text-align: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- GALLERY GRID CLASSIC (HORIZONTAL SCROLL) --- */
        .gallery-grid {
            display: flex;
            gap: 15px;
            padding: 20px 5% 50px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Ilangin scrollbar di PC */
            -webkit-overflow-scrolling: touch; /* Biar licin di HP */
        }

        .gallery-grid::-webkit-scrollbar { display: none; }

        .gallery-item {
            flex: 0 0 280px;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            scroll-snap-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s ease;
            background: #111;
        }

        .gallery-item.show { opacity: 1; transform: translateY(0); }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Di grid tetep cover biar rapi */
            pointer-events: none; /* Biar ga nge-block klik */
        }

        /* --- MODAL ULTRA FULLSCREEN (PERBAIKAN ZOOM & NAV) --- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            /* Matikan overflow biar panzoom gak bikin scroll di modal */
            overflow: hidden; 
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        /* Container untuk foto agar panzoom bekerja */
        .zoom-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto; /* Aktifkan pointer untuk zoom */
        }

        .modal img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* FOTO UTUH GAK TERPOTONG */
            display: block;
            user-select: none;
            pointer-events: none; /* Serahkan kontrol ke zoom-container */
        }

        /* Tombol Close Melayang */
        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            cursor: pointer;
            z-index: 10002;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .close-btn:hover { background: #f00; border-color: #f00; }

        /* --- NAVIGASI PANAH CUUSTOM < > --- */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            z-index: 10001;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .nav-btn:active { transform: translateY(-50%) scale(0.9); }

        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        /* Caption Overlay */
        .caption-overlay {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            pointer-events: none;
            z-index: 10000;
        }

        /* Responsif Tablet & HP */
        @media (max-width: 768px) {
            .gallery-item { flex: 0 0 80vw; height: 60vh; }
            .logo { font-size: 1.5rem; }
            .nav-btn { width: 50px; height: 50px; font-size: 24px; }
            .prev-btn { left: 10px; }
            .next-btn { right: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PHG7</div>
    </header>

    <div class="gallery-grid" id="mainGrid"></div>

    <div class="modal" id="modalContainer">
        <div class="zoom-container" id="zoomContainer">
            <img src="" id="fullViewImg">
        </div>

        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <button class="nav-btn prev-btn" id="prevBtn" onclick="prevFoto()">&#10094;</button>
        <button class="nav-btn next-btn" id="nextBtn" onclick="nextFoto()">&#10095;</button>

        <div class="caption-overlay">
            <h2 id="imgTitle" style="font-size: 1.2rem; font-weight: 300; letter-spacing: 2px;"></h2>
        </div>
    </div>

    <script>
        const album = [
            { src: 'p/7.JPG', title: 'PHG7' }, { src: 'p/8.JPG', title: 'PHG7' }, { src: 'p/9.JPG', title: 'PHG7' },
            { src: 'p/10.JPG', title: 'PHG7' }, { src: 'p/p.jpeg', title: 'PHG7' }, { src: 'p/12.JPG', title: 'PHG7' },
            { src: 'p/13.JPG', title: 'PHG7' }, { src: 'p/14.JPG', title: 'PHG7' }, { src: 'p/15.JPG', title: 'PHG7' },
            { src: 'p/16.JPG', title: 'PHG7' }, { src: 'p/17.JPG', title: 'PHG7' }
        ];

        let currentIndex = 0;
        const grid = document.getElementById('mainGrid');
        const modal = document.getElementById('modalContainer');
        const zoomContainer = document.getElementById('zoomContainer');
        const img = document.getElementById('fullViewImg');
        const title = document.getElementById('imgTitle');
        let panzoomInstance = null; // Variable untuk menyimpan instance panzoom

        // Load Foto ke Grid
        album.forEach((foto, i) => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            // Simpan index agar bisa navigasi
            item.onclick = () => openFull(i); 
            item.innerHTML = `<img src="${foto.src}" loading="lazy">`;
            grid.appendChild(item);
            setTimeout(() => item.classList.add('show'), i * 80);
        });

        // Buka Foto Fullscreen
        function openFull(index) {
            currentIndex = index;
            updateModal();
            modal.style.display = 'flex';
            // Trigger reflow untuk animasi
            modal.offsetHeight; 
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Matikan scroll body
            
            // --- Inisialisasi Panzoom HANYA SAAT MODAL BUKA ---
            // Ini untuk zoom jari/pinch di HP & touchpad di PC
            if (panzoomInstance) panzoomInstance.destroy(); // Bersihkan instance lama
            panzoomInstance = Panzoom(zoomContainer, {
                maxScale: 4, // Zoom maks 4x
                minScale: 1, // Gak bisa dikecilin lebih dari 1x
                contain: 'outside', // Contain foto agar gak melayang
                // Aktifkan zoom dengan touchpad
                wheel: { step: 0.1 }, 
                // Biar gak ganggu klik tombol di PC
                pointerEvents: 'auto' 
            });
        }

        // Fungsi Update Isi Modal
        function updateModal() {
            const data = album[currentIndex];
            img.src = data.src;
            title.innerText = data.title;
            
            // Reset posisi zoom setiap ganti foto
            if (panzoomInstance) {
                panzoomInstance.reset();
            }
        }

        // Fungsi Tutup Modal
        function closeModal() {
            modal.classList.remove('active');
            // Hancurkan instance panzoom agar bersih
            if (panzoomInstance) {
                panzoomInstance.destroy();
                panzoomInstance = null;
            }
            setTimeout(() => {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto'; // Aktifkan scroll body
            }, 300);
        }

        // Navigasi
        function prevFoto() {
            currentIndex = (currentIndex - 1 + album.length) % album.length;
            updateModal();
        }

        function nextFoto() {
            currentIndex = (currentIndex + 1) % album.length;
            updateModal();
        }

        // Navigasi Keyboard
        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('active')) return;
            if (e.key === 'ArrowLeft') prevFoto();
            if (e.key === 'ArrowRight') nextFoto();
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
