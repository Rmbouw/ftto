<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHG7 Gallery - Fix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent; /* Ilangin kotak biru pas diklik di HP */
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
            width: 100%;
        }

        header {
            padding: 40px 5% 20px;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 5px;
            background: linear-gradient(135deg, #ff0080, #7928ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* --- CONTAINER SCROLL --- */
        .gallery-grid {
            display: flex;
            gap: 20px;
            padding: 20px 10%;
            overflow-x: auto; /* BIAR BISA DIGESER */
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Ilangin scrollbar di PC */
            -webkit-overflow-scrolling: touch; /* BIAR LICIN PAS DIGESER DI HP */
            min-height: 450px;
            align-items: center;
        }

        .gallery-grid::-webkit-scrollbar { display: none; }

        .gallery-item {
            flex: 0 0 300px; /* Lebar foto di grid */
            height: 450px;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            scroll-snap-align: center;
            position: relative;
            z-index: 5; /* Biar di atas background */
            transition: transform 0.3s ease;
            background: #111;
        }

        .gallery-item:active { transform: scale(0.95); }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; /* Biar gambar gak nge-block klik pada div */
        }

        /* --- MODAL FULLSCREEN --- */
        #modalContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none; /* Default sembunyi */
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        #modalContainer img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* FOTO UTUH GAK TERPOTONG */
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            color: #fff;
            cursor: pointer;
            z-index: 10001;
        }

        /* Responsive HP */
        @media (max-width: 768px) {
            .gallery-item { flex: 0 0 80vw; height: 60vh; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PHG7</div>
    </header>

    <div class="gallery-grid" id="mainGrid"></div>

    <div id="modalContainer" onclick="closeModal()">
        <div class="close-btn">&times;</div>
        <img src="" id="fullViewImg">
    </div>

    <script>
        const album = [
            { src: 'p/7.JPG' }, { src: 'p/8.JPG' }, { src: 'p/9.JPG' },
            { src: 'p/10.JPG' }, { src: 'p/p.jpeg' }, { src: 'p/12.JPG' },
            { src: 'p/13.JPG' }, { src: 'p/14.JPG' }, { src: 'p/15.JPG' },
            { src: 'p/16.JPG' }, { src: 'p/17.JPG' }
        ];

        const grid = document.getElementById('mainGrid');

        album.forEach((foto) => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            // Pakai listener biar lebih mantap kliknya
            item.addEventListener('click', function() {
                openFull(foto.src);
            });

            item.innerHTML = `<img src="${foto.src}" loading="lazy">`;
            grid.appendChild(item);
        });

        function openFull(source) {
            const modal = document.getElementById('modalContainer');
            const img = document.getElementById('fullViewImg');
            
            img.src = source;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('modalContainer');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
